[project]
name = "aa-mjlab-env"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "active-adaptation",
    "mjlab>=1.4.0",
    "mujoco>=3.7.0",
]

[tool.uv.sources]
active-adaptation = { path = "../..", editable = true }
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv]
package = false
index-strategy = "unsafe-best-match"
override-dependencies = [
    "torch==2.11",
    "torchaudio==2.11",
    "torchvision==0.26.0",
]
