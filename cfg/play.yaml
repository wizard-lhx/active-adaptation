hydra:
  run:
    dir: ./outputs/play/${now:%Y-%m-%d}/${now:%H-%M-%S}-${task.name}-${algo.name}

headless: false

backend: isaac
device: cuda

record_video: false

app: # isaac-specific
  headless: ${..headless}
  enable_cameras: ${..record_video}

seed: 42
checkpoint_path: null
export_policy: false

defaults:
  - task: Velocity
  - algo: ppo
  - _self_

task:
  num_envs: 4
