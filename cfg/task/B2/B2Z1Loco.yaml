# @package task
name: B2Z1Loco

viewer:
  resolution: [1280, 720]
  lookat: [0., 0., 0.]
  eye: [4.0, 4.0, 4.0]

robot:
  name: unitree_b2_z1
terrain: plane


# common
num_envs: 4096
max_episode_length: 1000

sim:
  step_dt: 0.02
  isaac_physics_dt: 0.005
  mujoco_physics_dt: 0.002

input:
  action:
    _target_: JointPosition
    action_scaling:
      .*_hip_joint: 0.5
      .*_thigh_joint: 0.5
      .*_calf_joint: 0.5
    max_delay: 1
    alpha_range: [0.8, 0.9]

command:
  _target_: Twist
  linvel_x_range: [-1.0, 1.6]
  linvel_y_range: [-0.8, 0.8]
  angvel_range:   [-2.0, 2.0]
  yaw_stiffness_range: [0.5, 1.1]
  use_stiffness_ratio: 0.99
  base_height_range: [0.1, 0.52]
  locomotion_height_threshold: 0.30
  resample_interval: 250
  resample_prob: 0.5
  stand_prob: 0.08

observation:
  policy:
    command:  {}
    gravity_multistep: {steps: 4, noise_std: 0.05}
    joint_pos_multistep: {joint_names: ".*_(hip|thigh|calf)_joint", steps: 4, noise_std: 0.05}
    joint_vel_multistep: {joint_names: ".*_(hip|thigh|calf)_joint", steps: 4, noise_std: 0.2}
    prev_actions: {steps: 2}
  # priv:
    root_angvel_b:    {}

reward:
  loco:
    linvel_exp:         {weight: 1.5, dim: 2}
    linvel_projection:  {weight: 0.5}
    angvel_z_exp:       {weight: 0.8}
    angvel_xy_l2:       {weight: 0.01}
    linvel_z_l2:        {weight: 2.0}
    base_height_exp:    {weight: 1.0}
  regularization:
    energy_l1:          {weight: 0.0002, joint_names: ".*_(hip|thigh|calf)_joint"}
    joint_acc_l2:       {weight: 2.0e-7, joint_names: ".*_(hip|thigh|calf)_joint"}
    joint_torques_l2:   {weight: 2.0e-5, joint_names: ".*_(hip|thigh|calf)_joint"}
    survival:           {weight: 1.0}
    action_rate_l2:     {weight: 0.01}
    action_rate2_l2:    {weight: 0.002}
    feet_air_time:      {weight: 2.0, body_names: .*_foot, thres: 0.5}
    max_swing_height:   {weight: 8.0, body_names: .*_foot, target_height: 0.15}
    feet_sliding:       {weight: 0.2, body_names: .*_foot}
    undesired_contact:  {body_names: [.*_calf, .*thigh], weight: 0.25}
  debug:
    _enabled_: false
    linvel_projection:  {weight: 0.5}
    base_height_l1:     {weight: 1.0}
    is_standing_env:    {weight: 1.0}
    feet_contact_count: {weight: 1.0, body_names: .*_foot}

termination:
  max_episode_length: {}
  crash: {
    body_names_expr: [base_link, .*hip, .*thigh],
    t_thres: 0.01,
    prob: 0.4,
  }
  fall_over: {xy_thres: 0.9}
  undesired_contact: {body_names: [.*_calf]}

randomization:
  perturb_body_mass:
    .*: [0.8, 1.2]
  randomize_materials_isaac:
    body_names: .*_foot
    static_friction_range:  [0.5, 3.0]
    dynamic_friction_range: [0.5, 3.0]
    restitution_range:      [0.0, 0.5]
    homogeneous: true
  actuator_pd_gains:
    stiffness_range:
      .*_hip_joint: [0.8, 1.1]
      .*_thigh_joint: [0.8, 1.1]
      .*_calf_joint: [0.8, 1.1]
    damping_range:
      .*_hip_joint: [0.8, 1.1]
      .*_thigh_joint: [0.8, 1.1]
      .*_calf_joint: [0.8, 1.1]
  reset_joint_states_scale:
    pos_scales:
      .*_hip_joint: [0.8, 1.2]
      .*_thigh_joint: [0.8, 1.2]
      .*_calf_joint: [0.8, 1.2]
